name: GEO Audit

on:
  workflow_dispatch:
    inputs:
      commit_reports:
        description: "Commit report files back to the branch?"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run GEO audit
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python audit.py

      - name: Upload reports as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: geo-reports-${{ github.run_number }}
          path: outputs/
          if-no-files-found: warn

      - name: Commit reports back to branch
        if: ${{ inputs.commit_reports == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/
          git diff --cached --quiet && echo "No new reports to commit." || \
            git commit -m "chore: add GEO audit reports (run #${{ github.run_number }})"
          git push
